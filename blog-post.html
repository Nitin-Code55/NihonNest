<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | NihonNest</title>
    <meta name="description" content="Read Japan SSW insights on NihonNest.">
    <meta property="og:title" content="Blog Post | NihonNest">
    <meta property="og:description" content="Read Japan SSW insights on NihonNest.">
    <meta property="og:url" content="https://nihonnest.in/blog-post.html">
    <meta property="og:image" content="https://nihonnest.in/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-container { max-width: 800px; margin: 120px auto 4rem; padding: 2rem; background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; }
        .post-header { text-align: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2rem; }
        .post-category { font-size: 0.9rem; color: var(--primary-color); font-weight: bold; text-transform: uppercase; margin-bottom: 1rem; display: block; letter-spacing: 1px; }
        .post-title { font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .post-meta { font-size: 0.9rem; color: var(--text-light); display: flex; justify-content: center; gap: 1.5rem; }
        .post-content { font-size: 1.1rem; line-height: 1.8; color: var(--text-color); margin-bottom: 3rem; }
        .post-content h3 { margin: 2rem 0 1rem; color: var(--text-color); font-size: 1.5rem; }
        .post-content ul { padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .post-content li { margin-bottom: 0.5rem; }
        .post-content p { margin-bottom: 1.5rem; }
        .share-section { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .related-section { max-width: 1000px; margin: 0 auto 4rem; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .blog-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; text-decoration: none; display: block; transition: 0.3s; }
        .blog-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        .blog-card h4 { color: var(--text-color); margin-bottom: 0.5rem; }
        .blog-card p { color: var(--text-light); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="global-parallax">
        <div class="parallax-layer parallax-bg"></div>
    </div>
    
    <nav class="navbar glass">
        <div class="container nav-container">
            <a href="index.html" class="logo">🇯🇵 NihonNest 🇮🇳</a>
            <div class="hamburger"><i class="fas fa-bars"></i></div>
            
            <div class="nav-links">
                <a href="index.html" >Home</a>
                <a href="jobs.html">Jobs</a>
                <div class="dropdown">
                    <button class="dropbtn">Services <i class="fas fa-caret-down"></i></button>
                    <div class="dropdown-content">
                        <a href="services.html">All Services</a>
                        <a href="softlanding.html">Soft Landing</a>
                        <a href="consult.html">Consultation</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Tools <i class="fas fa-caret-down"></i></button>
                    <div class="dropdown-content">
                        <a href="eligibility.html">Eligibility Check</a>
                        <a href="checklist.html">Visa Checklist</a>
                        <a href="calculator.html">EMI Calculator</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Resources <i class="fas fa-caret-down"></i></button>
                    <div class="dropdown-content">
                        <a href="blog.html">Blog</a>
                        <a href="resources.html">Study Guides</a>
                    </div>
                </div>
                <a href="about.html">About</a>
                <a href="consult.html" class="btn btn-primary" style="padding: 8px 16px; margin-left: 10px;">Book Call</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="post-container fade-in" id="postContainer">
            <p style="text-align:center;">Loading post...</p>
        </div>

        <div class="related-section fade-in delay-200" style="display:none;" id="relatedSection">
            <h3 style="text-align: center;">Related Posts</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div>
                    <a href="index.html" class="footer-logo">🇯🇵 NihonNest 🇮🇳</a>
                    <p style="margin-bottom: 1rem; color: var(--text-light); line-height: 1.8;">India's first verified Japan Settlement & Placement Platform.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            const postContainer = document.getElementById('postContainer');
            const relatedSection = document.getElementById('relatedSection');
            const relatedGrid = document.getElementById('relatedGrid');

            if (!postId) {
                postContainer.innerHTML = '<p style="text-align:center;">Post not found. <a href="blog.html" style="color:var(--primary-color);">Return to Blog</a></p>';
                return;
            }

            try {
                const response = await fetch('data/blogs.json');
                const blogs = await response.json();
                
                const post = blogs.find(b => b.id === postId);
                
                if (!post) {
                    postContainer.innerHTML = '<p style="text-align:center;">Post not found. <a href="blog.html" style="color:var(--primary-color);">Return to Blog</a></p>';
                    return;
                }

                // Update Meta Tags
                document.title = \`\${post.title} | NihonNest\`;

                // Render Post
                postContainer.innerHTML = \`
                    <header class="post-header">
                        <span class="post-category">\${post.icon} \${post.category}</span>
                        <h1 class="post-title">\${post.title}</h1>
                        <div class="post-meta">
                            <span><i class="far fa-calendar"></i> \${post.date}</span>
                            <span><i class="far fa-clock"></i> \${post.readTime}</span>
                            <span><i class="far fa-user"></i> \${post.author}</span>
                        </div>
                    </header>
                    <div class="post-content">
                        \${post.content}
                    </div>
                    <div class="share-section">
                        <p style="margin-bottom: 1rem; color: var(--text-light);">Help your friends go to Japan. Share this guide!</p>
                        <a href="https://wa.me/?text=\${encodeURIComponent(post.title + ' - Read more at https://nihonnest.in/blog-post.html?id=' + post.id)}" target="_blank" class="btn" style="background: #25D366; color: white; display: inline-flex; align-items: center; gap: 8px;">
                            <i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i> Share on WhatsApp
                        </a>
                    </div>
                \`;

                // Render Related
                const related = blogs.filter(b => b.category === post.category && b.id !== post.id).slice(0, 3);
                if (related.length > 0) {
                    relatedSection.style.display = 'block';
                    relatedGrid.innerHTML = related.map(r => \`
                        <a href="blog-post.html?id=\${r.id}" class="blog-card">
                            <h4>\${r.icon} \${r.title}</h4>
                            <p>\${r.readTime} • \${r.date}</p>
                        </a>
                    \`).join('');
                }

            } catch (err) {
                postContainer.innerHTML = '<p style="text-align:center;">Failed to load post. <a href="blog.html" style="color:var(--primary-color);">Return to Blog</a></p>';
            }
        });
    </script>
</body>
</html>
